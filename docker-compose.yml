version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-sprint-db
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: sprint
      POSTGRES_PASSWORD: sprint123
      POSTGRES_DB: ai_sprint_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sprint -d ai_sprint_db']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
